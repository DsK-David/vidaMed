<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MedControl</title>
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #0a0f0e;
      color: #5ee0b4;
      font-family: system-ui, sans-serif;
    }
    .loader {
      text-align: center;
    }
    .loader span {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #5ee0b4;
      margin: 0 4px;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .loader span:nth-child(2) { animation-delay: 0.2s; }
    .loader span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="loader">
    <p style="margin-bottom:16px;font-size:18px;letter-spacing:0.02em">MedControl</p>
    <div><span></span><span></span><span></span></div>
  </div>
  <script>
    // Redireciona para o servidor Express
    var SERVER_URL = 'http://localhost:3000';
    fetch(SERVER_URL + '/api/auth/me', { credentials: 'include' })
      .then(function(r) { return r.json(); })
      .then(function(user) {
        if (user.role === 'doctor') window.location.href = SERVER_URL + '/doctor';
        else if (user.role === 'patient') window.location.href = SERVER_URL + '/paciente';
        else window.location.href = SERVER_URL + '/';
      })
      .catch(function() {
        window.location.href = SERVER_URL + '/';
      });
  </script>
</body>
</html>
